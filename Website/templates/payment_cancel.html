{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5 text-center py-5">
    <div class="mb-4">
      <i class="bi bi-x-circle-fill text-danger" style="font-size: 4rem;"></i>
    </div>
    <h2 class="fw-bold mb-2">Payment Cancelled</h2>
    <p class="text-light-subtle mb-4">
      Your payment was cancelled and you have not been charged. You can try again whenever you're ready.
    </p>
    <a href="/dashboard#store" class="btn btn-silver me-2">
      <i class="bi bi-arrow-counterclockwise me-1"></i>Try Again
    </a>
    <a href="/dashboard" class="btn btn-outline-light">
      <i class="bi bi-speedometer2 me-1"></i>Go to Dashboard
    </a>
  </div>
</div>
{% endblock %}
