services:

  # ── Database ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    build: ./API
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-SilverShade API}
      SECRET_KEY: ${SECRET_KEY}
      SERVICE_API_KEY: ${SERVICE_API_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: ${MONGODB_DB:-silvershade}
      # Website container is on the same Docker network — no localhost needed.
      ALLOWED_ORIGINS: "http://localhost:8080,http://website:8080"
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-silvershade_access_token}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-100}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      REDIS_URL: ${REDIS_URL:-}
      DISCORD_TEST_WEBHOOK_URL: ${DISCORD_TEST_WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "8000:8000"

  # ── Frontend (reverse-proxy to API) ───────────────────────────────────────
  website:
    build: ./Website
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Service name 'api' resolves inside the Docker network.
      SILVERSHADE_API: http://api:8000
    ports:
      - "8080:8080"

  # ── Discord Bot ───────────────────────────────────────────────────────────
  discordbot:
    build: ./DiscordBot
    restart: unless-stopped
    depends_on:
      - api
    environment:
      SILVERSHADE_API: http://api:8000
      SILVERSHADE_API_KEY: ${SERVICE_API_KEY}
      SILVERSHADE_ADMIN_TOKEN: ${SILVERSHADE_ADMIN_TOKEN:-}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      COMMAND_PREFIX: ${COMMAND_PREFIX:-!}
      ADMIN_ROLE_NAME: ${ADMIN_ROLE_NAME:-Admin}
      LOG_CHANNEL_IDS: ${LOG_CHANNEL_IDS:-}
      BACKEND_ROLE_MAP: ${BACKEND_ROLE_MAP:-{}}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-5000}

  # ── FiveM Dummy Server ────────────────────────────────────────────────────
  fivemdummy:
    build: ./FivemDummy
    restart: unless-stopped
    depends_on:
      - api
    environment:
      SILVERSHADE_API: http://api:8000
      SILVERSHADE_API_KEY: ${SERVICE_API_KEY}
      SILVERSHADE_ADMIN_TOKEN: ${SILVERSHADE_ADMIN_TOKEN:-}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-5000}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      RETRY_BASE_DELAY_MS: ${RETRY_BASE_DELAY_MS:-500}
      LOG_FILE_PATH: ${LOG_FILE_PATH:-logs/server.log}
    ports:
      - "3000:3000"

volumes:
  mongo_data:
